  <path d="M267 191a113 113 0 0 1 102 113" fill="none" stroke="url(#ember)" stroke-linecap="round" stroke-width="25" filter="url(#glow)" />
  <path d="M256 308 356 197" fill="none" stroke="url(#lime)" stroke-linecap="round" stroke-width="16" filter="url(#glow)" />
