<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">CSS Performance Budget logo</title>
  <desc id="desc">A dark hex badge with an ember speed gauge, CSS braces, and a lime budget needle.</desc>
  <defs>
    <linearGradient id="bg" x1="72" x2="440" y1="56" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b1810" />
      <stop offset="0.46" stop-color="#17120e" />
      <stop offset="1" stop-color="#25140c" />
    </linearGradient>
    <linearGradient id="ember" x1="132" x2="396" y1="128" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd166" />
      <stop offset="0.42" stop-color="#ff7a1a" />
      <stop offset="1" stop-color="#ff3d00" />
    </linearGradient>
    <linearGradient id="lime" x1="235" x2="356" y1="276" y2="193" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7ff8a" />
      <stop offset="1" stop-color="#9bf22f" />
    </linearGradient>
    <filter id="glow" color-interpolation-filters="sRGB" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <path d="M256 28 443 136v240L256 484 69 376V136z" />
    </clipPath>
  </defs>
